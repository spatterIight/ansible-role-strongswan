---
name: molecule

on: [push, pull_request]  # yamllint disable-line rule:truthy

jobs:
  molecule:
    name: Run Molecule scenario '${{ matrix.scenario }}' on ${{ matrix.distro }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        distro:
          - ubuntu2404
          - ubuntu2204
          - debian13
          - debian12
        scenario:
          - stroke
          - vici
      fail-fast: false

    env:
      MOLECULE_DISTRO: ${{ matrix.distro }}
      PY_COLORS: "1"
      ANSIBLE_FORCE_COLOR: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          path: strongswan

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: strongswan/.python-version
          cache: pip
          cache-dependency-path: strongswan/molecule/requirements.txt

      - name: Install Python dependencies
        working-directory: strongswan
        run: pip install -r molecule/requirements.txt

      - name: Cache Ansible collections
        uses: actions/cache@v5.0.5
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('strongswan/molecule/stroke/requirements.yml') }}

      - name: Install Ansible collections
        working-directory: strongswan
        run: ansible-galaxy collection install -r molecule/stroke/requirements.yml

      - name: Run Molecule
        working-directory: strongswan
        run: molecule test --scenario-name ${{ matrix.scenario }}
